name: GHCR Build Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ghcr-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      image_prefix: ${{ steps.meta.outputs.image_prefix }}
      push_images: ${{ steps.meta.outputs.push_images }}
    steps:
      - name: Lowercase owner
        id: meta
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image_prefix=ghcr.io/${owner}/paiflow" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "push_images=false" >> "$GITHUB_OUTPUT"
          else
            echo "push_images=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: console-frontend
            dockerfile: docker/PaiFlow/Dockerfile.frontend
          - name: console-hub
            dockerfile: docker/PaiFlow/Dockerfile.backend
          - name: core-workflow-java
            dockerfile: docker/PaiFlow/Dockerfile.workflow
          - name: core-aitools
            dockerfile: core/plugin/aitools/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: needs.prepare.outputs.push_images == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.image_prefix }}-${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ needs.prepare.outputs.push_images == 'true' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
